<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>API de Tradução</title>

    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet" />
    <script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f0f2f5;
            color: #1a1a2e;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            color: #2d3a8c;
            font-weight: 700;
        }

        header p {
            color: #666;
            margin-top: .4rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 12px rgba(0,0,0,.08);
        }

        .card h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        #editor-container {
            border-radius: 0 0 8px 8px;
        }

        .ql-toolbar { border-radius: 8px 8px 0 0 !important; }
        .ql-container { border-radius: 0 0 8px 8px !important; min-height: 180px; font-size: 1rem; }

        .source-row {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        select {
            padding: .5rem .75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: .95rem;
            background: white;
            color: #333;
            cursor: pointer;
        }

        .lang-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: .6rem;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: .5rem;
            padding: .5rem .75rem;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s;
            user-select: none;
        }

        .lang-item:hover { border-color: #2d3a8c; background: #f5f6ff; }
        .lang-item input[type=checkbox]:checked + .lang-label { font-weight: 600; color: #2d3a8c; }
        .lang-item:has(input:checked) { border-color: #2d3a8c; background: #eef0ff; }

        input[type=checkbox] { width: 16px; height: 16px; accent-color: #2d3a8c; cursor: pointer; }

        .btn-row {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }

        button {
            padding: .65rem 1.4rem;
            border: none;
            border-radius: 8px;
            font-size: .95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all .15s;
        }

        #btn-translate {
            background: #2d3a8c;
            color: white;
            flex: 1;
        }

        #btn-translate:hover { background: #1e286b; }
        #btn-translate:disabled { background: #9aa0c9; cursor: not-allowed; }

        #btn-publish {
            background: #17a34a;
            color: white;
            display: none;
        }

        #btn-publish:hover { background: #138a3d; }

        #status {
            font-size: .9rem;
            padding: .5rem .75rem;
            border-radius: 8px;
            display: none;
        }

        #status.info  { background: #e8f0fe; color: #1a56db; display: block; }
        #status.ok    { background: #d1fae5; color: #065f46; display: block; }
        #status.error { background: #fee2e2; color: #991b1b; display: block; }

        .result-block {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1rem;
        }

        .result-header {
            background: #f9fafb;
            padding: .65rem 1rem;
            font-size: .85rem;
            font-weight: 600;
            color: #555;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .result-content {
            padding: 1rem;
            font-size: .95rem;
            line-height: 1.6;
        }

        .result-content h1 { font-size: 1.5rem; margin-bottom: .5rem; }
        .result-content h2 { font-size: 1.25rem; margin-bottom: .4rem; }
        .result-content p  { margin-bottom: .4rem; }

        #results-area { display: none; }

        .flag { font-size: 1.1rem; }

        #btn-clear {
            background: transparent;
            color: #888;
            border: 1.5px solid #ddd;
            padding: .35rem .9rem;
            font-size: .85rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: all .15s;
        }

        #btn-clear:hover {
            background: #fee2e2;
            color: #991b1b;
            border-color: #fca5a5;
        }

        #historico-area { margin-top: 0; }

        .hist-list { display: flex; flex-direction: column; gap: .5rem; }

        .hist-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: .6rem .9rem;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #fafafa;
            font-size: .9rem;
            gap: 1rem;
        }

        .hist-item:hover { background: #f0f2ff; border-color: #c7cdf5; }

        .hist-meta { color: #666; font-size: .8rem; margin-top: .15rem; }

        .btn-download {
            background: #2d3a8c;
            color: white;
            padding: .35rem .85rem;
            font-size: .82rem;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-download:hover { background: #1e286b; }

        .btn-view {
            background: transparent;
            color: #2d3a8c;
            border: 1.5px solid #2d3a8c;
            padding: .35rem .85rem;
            font-size: .82rem;
            border-radius: 6px;
            white-space: nowrap;
            flex-shrink: 0;
            font-weight: 600;
            cursor: pointer;
        }

        .btn-view:hover { background: #eef0ff; }

        .hist-item-actions { display: flex; gap: .5rem; flex-shrink: 0; }

        .hist-detail { margin: -.2rem 0 .8rem; }

        .hist-empty { color: #999; font-size: .9rem; text-align: center; padding: 1rem 0; }

        #btn-refresh-hist {
            font-size: .8rem;
            font-weight: 500;
            background: #f0f2f5;
            color: #555;
            border: 1px solid #ddd;
            padding: .3rem .75rem;
            border-radius: 6px;
            margin-left: auto;
        }

        #btn-refresh-hist:hover { background: #e4e6eb; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>API de Tradução</h1>
    </header>

    <div class="card">
        <h2>Texto a traduzir</h2>
        <div id="editor-container">
            <div id="editor">
                <p>Escreve ou cola aqui o texto que queres traduzir.</p>
            </div>
        </div>
        <div style="display: flex; justify-content: flex-end; margin-top: .6rem;">
            <button id="btn-clear" title="Limpar editor">Limpar</button>
        </div>
    </div>

    <div class="card">
        <h2>Idioma de origem</h2>
        <div class="source-row">
            <select id="source-lang">
                <option value="pt">🇵🇹 Português</option>
                <option value="en">🇬🇧 Inglês</option>
                <option value="fr">🇫🇷 Francês</option>
                <option value="es">🇪🇸 Espanhol</option>
                <option value="de">🇩🇪 Alemão</option>
                <option value="it">🇮🇹 Italiano</option>
                <option value="zh">🇨🇳 Chinês</option>
            </select>
        </div>
    </div>

    <div class="card">
        <h2>Idiomas de destino</h2>
        <div class="lang-grid">
            <label class="lang-item"><input type="checkbox" value="en" checked /><span class="lang-label">🇬🇧 Inglês</span></label>
            <label class="lang-item"><input type="checkbox" value="fr" /><span class="lang-label">🇫🇷 Francês</span></label>
            <label class="lang-item"><input type="checkbox" value="es" /><span class="lang-label">🇪🇸 Espanhol</span></label>
            <label class="lang-item"><input type="checkbox" value="de" /><span class="lang-label">🇩🇪 Alemão</span></label>
            <label class="lang-item"><input type="checkbox" value="it" /><span class="lang-label">🇮🇹 Italiano</span></label>
            <label class="lang-item"><input type="checkbox" value="nl" /><span class="lang-label">🇳🇱 Holandês</span></label>
            <label class="lang-item"><input type="checkbox" value="zh" /><span class="lang-label">🇨🇳 Chinês</span></label>
            <label class="lang-item"><input type="checkbox" value="ja" /><span class="lang-label">🇯🇵 Japonês</span></label>
            <label class="lang-item"><input type="checkbox" value="ar" /><span class="lang-label">🇸🇦 Árabe</span></label>
        </div>
    </div>

    <div class="card">
        <div class="btn-row" style="margin-bottom: .75rem;">
            <button id="btn-translate">Traduzir</button>
            <button id="btn-publish">Guardar</button>
        </div>
        <div id="status"></div>
    </div>

    <div id="results-area">
        <div class="card">
            <h2>Resultados</h2>
            <div id="results-container"></div>
        </div>
    </div>

    <div id="historico-area">
        <div class="card">
            <h2>
                Histórico de Traduções
                <button id="btn-refresh-hist">Atualizar</button>
            </h2>
            <div id="hist-list" class="hist-list">
                <p class="hist-empty">A carregar…</p>
            </div>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:5100/api';

    const LANG_NAMES = {
        pt: '🇵🇹 Português', en: '🇬🇧 Inglês', fr: '🇫🇷 Francês',
        es: '🇪🇸 Espanhol', de: '🇩🇪 Alemão', it: '🇮🇹 Italiano',
        nl: '🇳🇱 Holandês', zh: '🇨🇳 Chinês', ja: '🇯🇵 Japonês', ar: '🇸🇦 Árabe'
    };

    const quill = new Quill('#editor', {
        theme: 'snow',
        modules: {
            toolbar: [
                [{ header: [1, 2, 3, false] }],
                ['bold', 'italic', 'underline', 'strike'],
                [{ list: 'ordered' }, { list: 'bullet' }],
                ['clean']
            ]
        }
    });

    let lastRecord = null;

    document.getElementById('btn-clear').addEventListener('click', () => {
        quill.setContents([]);
        document.getElementById('results-area').style.display = 'none';
        document.getElementById('btn-publish').style.display = 'none';
        const status = document.getElementById('status');
        status.textContent = '';
        status.className = '';
        lastRecord = null;
    });

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.textContent = msg;
        el.className = type;
    }

    function getSelectedLangs() {
        return [...document.querySelectorAll('.lang-item input:checked')].map(cb => cb.value);
    }

    async function loadHistorico() {
        const list = document.getElementById('hist-list');
        list.innerHTML = '<p class="hist-empty">A carregar…</p>';
        try {
            const res = await fetch(`${API_BASE}/historico`);
            const data = await res.json();
            renderHistorico(data.entries ?? []);
        } catch {
            list.innerHTML = '<p class="hist-empty" style="color:#991b1b">Não foi possível carregar o histórico.</p>';
        }
    }

    function safeId(fileName) {
        return fileName.replace(/[^a-zA-Z0-9_-]/g, '_');
    }

    function renderHistorico(entries) {
        const list = document.getElementById('hist-list');
        if (!entries.length) {
            list.innerHTML = '<p class="hist-empty">Ainda não há traduções guardadas.</p>';
            return;
        }
        list.innerHTML = '';
        for (const e of entries) {
            const date = new Date(e.createdAt).toLocaleString('pt-PT');
            const kb = (e.sizeBytes / 1024).toFixed(1);
            const id = safeId(e.fileName);

            const item = document.createElement('div');
            item.className = 'hist-item';
            item.innerHTML = `
                <div>
                    <div>${e.fileName}</div>
                    <div class="hist-meta">${date} · ${kb} KB</div>
                </div>
                <div class="hist-item-actions">
                    <button class="btn-view" data-filename="${e.fileName}" data-target="hist-detail-${id}">Ver</button>
                    <a class="btn-download" href="${API_BASE}/historico/${encodeURIComponent(e.fileName)}" download="${e.fileName}">Download json</a>
                </div>
            `;
            list.appendChild(item);

            const detail = document.createElement('div');
            detail.className = 'hist-detail';
            detail.id = `hist-detail-${id}`;
            detail.style.display = 'none';
            list.appendChild(detail);
        }
    }

    document.getElementById('hist-list').addEventListener('click', async (ev) => {
        const btn = ev.target.closest('.btn-view');
        if (!btn) return;

        const fileName = btn.dataset.filename;
        const detail = document.getElementById(btn.dataset.target);

        if (detail.style.display === 'block') {
            detail.style.display = 'none';
            btn.textContent = 'Ver';
            return;
        }

        detail.style.display = 'block';
        btn.textContent = 'Ocultar';

        if (detail.dataset.loaded) return;

        detail.innerHTML = '<p class="hist-empty">A carregar…</p>';
        try {
            const res = await fetch(`${API_BASE}/historico/${encodeURIComponent(fileName)}/conteudo`);
            if (!res.ok) throw new Error('Não encontrado');
            const record = await res.json();
            renderResults(record, detail);
            detail.dataset.loaded = '1';
        } catch (err) {
            detail.innerHTML = `<p class="hist-empty" style="color:#991b1b">Não foi possível carregar esta tradução.</p>`;
        }
    });

    document.getElementById('btn-refresh-hist').addEventListener('click', loadHistorico);
    loadHistorico();

    document.getElementById('btn-translate').addEventListener('click', async () => {
        const html = quill.root.innerHTML.trim();
        const sourceLang = document.getElementById('source-lang').value;
        const targetLangs = getSelectedLangs();

        if (!html || html === '<p><br></p>') {
            setStatus('Escreve algum texto antes de traduzir.', 'error'); return;
        }
        if (targetLangs.length === 0) {
            setStatus('Seleciona pelo menos um idioma de destino.', 'error'); return;
        }

        const btn = document.getElementById('btn-translate');
        btn.disabled = true;
        btn.textContent = 'A traduzir...';
        setStatus('A traduzir...', 'info');
        document.getElementById('results-area').style.display = 'none';
        document.getElementById('btn-publish').style.display = 'none';

        try {
            const res = await fetch(`${API_BASE}/translate`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ htmlContent: html, sourceLanguage: sourceLang, targetLanguages: targetLangs })
            });

            const data = await res.json();

            if (!res.ok) {
                setStatus(`Erro: ${data.error ?? 'Erro desconhecido'}`, 'error'); return;
            }

            lastRecord = data.result;
            renderResults(data.result);
            setStatus(`${data.message}`, 'ok');
            document.getElementById('btn-publish').style.display = 'inline-block';

        } catch (err) {
            setStatus(`Não foi possível ligar à API. Confirma que o servidor está a correr.\n${err.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Traduzir';
        }
    });

    document.getElementById('btn-publish').addEventListener('click', async () => {
        if (!lastRecord) return;

        const btn = document.getElementById('btn-publish');
        btn.disabled = true;
        btn.textContent = 'A guardar...';
        setStatus('A guardar no histórico…', 'info');

        try {
            const res = await fetch(`${API_BASE}/publish`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ record: lastRecord })
            });

            const data = await res.json();

            if (!res.ok) {
                setStatus(`Erro ao guardar: ${data.error ?? 'Erro desconhecido'}`, 'error'); return;
            }

            setStatus(`${data.message} Ficheiro: ${data.fileName}`, 'ok');
            btn.style.display = 'none';
            loadHistorico();

        } catch (err) {
            setStatus(`Erro ao ligar ao endpoint /publish: ${err.message}`, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Guardar';
        }
    });

    function renderResults(record, targetContainer) {
        const container = targetContainer ?? document.getElementById('results-container');
        container.innerHTML = '';

        const origBlock = createResultBlock('Original - ' + (LANG_NAMES[record.sourceLanguage] ?? record.sourceLanguage), record.originalText);
        container.appendChild(origBlock);

        for (const t of record.translations) {
            const name = LANG_NAMES[t.language] ?? t.language.toUpperCase();
            const block = createResultBlock(name, t.translatedText);
            container.appendChild(block);
        }

        if (!targetContainer) {
            document.getElementById('results-area').style.display = 'block';
        }
    }

    function createResultBlock(title, html) {
        const block = document.createElement('div');
        block.className = 'result-block';
        block.innerHTML = `
            <div class="result-header">${title}</div>
            <div class="result-content">${html}</div>
        `;
        return block;
    }
</script>

</body>
</html>
