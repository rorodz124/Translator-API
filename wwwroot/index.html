<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>API de Tradução</title>
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet"/>
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;padding:2rem 1rem}
.container{max-width:860px;margin:0 auto}
header{text-align:center;margin-bottom:2rem}
header h1{font-size:2rem;color:#2d3a8c;font-weight:700}
.card{background:#fff;border-radius:12px;padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card h2{font-size:1rem;font-weight:600;color:#444;margin-bottom:1rem;display:flex;align-items:center;gap:.5rem}
.ql-toolbar{border-radius:8px 8px 0 0!important}
.ql-container{border-radius:0 0 8px 8px!important;min-height:180px;font-size:1rem}
.source-row{display:flex;gap:1rem;align-items:center}
select{padding:.5rem .75rem;border:1px solid #ddd;border-radius:8px;font-size:.95rem;background:#fff;color:#333;cursor:pointer}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:.6rem}
.lang-item{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;border:1.5px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:all .15s;user-select:none}
.lang-item:hover{border-color:#2d3a8c;background:#f5f6ff}
.lang-item:has(input:checked){border-color:#2d3a8c;background:#eef0ff}
.lang-item input:checked+.lang-label{font-weight:600;color:#2d3a8c}
input[type=checkbox]{width:16px;height:16px;accent-color:#2d3a8c;cursor:pointer}
.btn-row{display:flex;gap:1rem;flex-wrap:wrap}
button{padding:.65rem 1.4rem;border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .15s}
#btn-translate{background:#2d3a8c;color:#fff;flex:1}
#btn-translate:hover{background:#1e286b}
#btn-translate:disabled{background:#9aa0c9;cursor:not-allowed}
#btn-publish{background:#17a34a;color:#fff;display:none}
#btn-publish:hover{background:#138a3d}
#btn-clear{background:transparent;color:#888;border:1.5px solid #ddd;padding:.35rem .9rem;font-size:.85rem;font-weight:500;border-radius:8px;cursor:pointer;transition:all .15s}
#btn-clear:hover{background:#fee2e2;color:#991b1b;border-color:#fca5a5}
#status{font-size:.9rem;padding:.5rem .75rem;border-radius:8px;display:none}
#status.info{background:#e8f0fe;color:#1a56db;display:block}
#status.ok{background:#d1fae5;color:#065f46;display:block}
#status.error{background:#fee2e2;color:#991b1b;display:block}
.result-block{border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:1rem}
.result-header{background:#f9fafb;padding:.65rem 1rem;font-size:.85rem;font-weight:600;color:#555;border-bottom:1px solid #e5e7eb;display:flex;align-items:center;gap:.4rem}
.result-content{padding:1rem;font-size:.95rem;line-height:1.6}
.result-content h1{font-size:1.5rem;margin-bottom:.5rem}
.result-content h2{font-size:1.25rem;margin-bottom:.4rem}
.result-content p{margin-bottom:.4rem}
#results-area{display:none}
.hist-list{display:flex;flex-direction:column;gap:.5rem}
.hist-item{display:flex;align-items:center;justify-content:space-between;padding:.6rem .9rem;border:1px solid #e5e7eb;border-radius:8px;background:#fafafa;font-size:.9rem;gap:1rem}
.hist-item:hover{background:#f0f2ff;border-color:#c7cdf5}
.hist-meta{color:#666;font-size:.8rem;margin-top:.15rem}
.hist-item-actions{display:flex;gap:.5rem;flex-shrink:0}
.hist-detail{margin:-.2rem 0 .8rem}
.hist-empty{color:#999;font-size:.9rem;text-align:center;padding:1rem 0}
.btn-download{background:#2d3a8c;color:#fff;padding:.35rem .85rem;font-size:.82rem;border-radius:6px;white-space:nowrap;flex-shrink:0;text-decoration:none;font-weight:600}
.btn-download:hover{background:#1e286b}
.btn-view{background:transparent;color:#2d3a8c;border:1.5px solid #2d3a8c;padding:.35rem .85rem;font-size:.82rem;border-radius:6px;white-space:nowrap;flex-shrink:0;font-weight:600;cursor:pointer}
.btn-view:hover{background:#eef0ff}
#btn-refresh-hist{font-size:.8rem;font-weight:500;background:#f0f2f5;color:#555;border:1px solid #ddd;padding:.3rem .75rem;border-radius:6px;margin-left:auto}
#btn-refresh-hist:hover{background:#e4e6eb}
.btn-delete{background:transparent;color:#991b1b;border:1.5px solid #fca5a5;padding:.35rem .85rem;font-size:.82rem;border-radius:6px;white-space:nowrap;flex-shrink:0;font-weight:600;cursor:pointer}
.btn-delete:hover{background:#fee2e2;border-color:#991b1b}
</style>
</head>
<body>
<div class="container">
  <header><h1>API de Tradução</h1></header>

  <div class="card">
    <h2>Texto a traduzir</h2>
    <div id="editor"><p>Escreve ou cola aqui o texto que queres traduzir.</p></div>
    <div style="display:flex;justify-content:flex-end;margin-top:.6rem">
      <button id="btn-clear">Limpar</button>
    </div>
  </div>

  <div class="card">
    <h2>Idioma de origem</h2>
    <div class="source-row">
      <select id="source-lang"><option value="">A carregar idiomas…</option></select>
    </div>
  </div>

  <div class="card">
    <h2>Idiomas de destino</h2>
    <div class="lang-grid" id="lang-grid"><p class="hist-empty">A carregar idiomas…</p></div>
  </div>

  <div class="card">
    <div class="btn-row" style="margin-bottom:.75rem">
      <button id="btn-translate">Traduzir</button>
      <button id="btn-publish">Guardar</button>
    </div>
    <div id="status"></div>
  </div>

  <div id="results-area">
    <div class="card">
      <h2>Resultados</h2>
      <div id="results-container"></div>
    </div>
  </div>

  <div id="historico-area">
    <div class="card">
      <h2>Histórico de Traduções <button id="btn-refresh-hist">Atualizar</button></h2>
      <div id="hist-list" class="hist-list"><p class="hist-empty">A carregar…</p></div>
    </div>
  </div>
</div>

<script>
const API_BASE='http://localhost:5100/api';
const $=id=>document.getElementById(id);


const PORTUGUESE_NAMES={
  pt:'Português',pb:'Português (Brasil)',en:'Inglês',fr:'Francês',es:'Espanhol',
  de:'Alemão',it:'Italiano',nl:'Holandês',zh:'Chinês',zt:'Chinês (tradicional)',
  ja:'Japonês',ar:'Árabe',ru:'Russo',pl:'Polaco',ko:'Coreano',tr:'Turco',
  sv:'Sueco',da:'Dinamarquês',fi:'Finlandês',el:'Grego',he:'Hebraico',hi:'Hindi',
  hu:'Húngaro',id:'Indonésio',cs:'Checo',ro:'Romeno',uk:'Ucraniano',vi:'Vietnamita',
  fa:'Persa',sk:'Eslovaco',bg:'Búlgaro',sl:'Esloveno',lt:'Lituano',lv:'Letão',
  et:'Estónio',ga:'Irlandês',ms:'Malaio',th:'Tailandês',ca:'Catalão',az:'Azerbaijano',
  eo:'Esperanto',ur:'Urdu',sq:'Albanês',nb:'Norueguês',tl:'Tagalo',eu:'Basco',
  bn:'Bengali',gl:'Galego',ky:'Quirguiz'
};

let LANG_NAMES={};

async function loadLanguages(){
  const select=$('source-lang');
  const grid=$('lang-grid');
  try{
    const languages=await(await fetch(`${API_BASE}/languages`)).json();
    if(!Array.isArray(languages)||!languages.length)throw new Error('Lista vazia');

    languages.sort((a,b)=>(PORTUGUESE_NAMES[a.code]||a.name||a.code).localeCompare(PORTUGUESE_NAMES[b.code]||b.name||b.code,'pt'));

    LANG_NAMES={};
    select.innerHTML='';
    grid.innerHTML='';

    for(const lang of languages){
      const label=PORTUGUESE_NAMES[lang.code]||lang.name||lang.code.toUpperCase();
      LANG_NAMES[lang.code]=label;

      const opt=document.createElement('option');
      opt.value=lang.code; opt.textContent=label;
      if(lang.code==='pt')opt.selected=true;
      select.appendChild(opt);

      const item=document.createElement('label');
      item.className='lang-item';
      item.innerHTML=`<input type="checkbox" value="${lang.code}"${lang.code==='en'?' checked':''}><span class="lang-label">${label}</span>`;
      grid.appendChild(item);
    }
  }catch(err){
    grid.innerHTML='<p class="hist-empty" style="color:#991b1b">Não foi possível obter as línguas do LibreTranslate. Confirma que o container está a correr.</p>';
    select.innerHTML='<option value="">Indisponível</option>';
  }
}
loadLanguages();

const quill=new Quill('#editor',{theme:'snow',modules:{toolbar:[[{header:[1,2,3,false]}],['bold','italic','underline','strike'],[{list:'ordered'},{list:'bullet'}],['clean']]}});
let lastRecord=null;

$('btn-clear').addEventListener('click',()=>{
  quill.setContents([]);
  $('results-area').style.display='none';
  $('btn-publish').style.display='none';
  const s=$('status'); s.textContent=''; s.className='';
  lastRecord=null;
});

function setStatus(msg,type){const e=$('status');e.textContent=msg;e.className=type;}

function getSelectedLangs(){return[...document.querySelectorAll('.lang-item input:checked')].map(c=>c.value);}

async function loadHistorico(){
  const list=$('hist-list');
  list.innerHTML='<p class="hist-empty">A carregar…</p>';
  try{
    const data=await(await fetch(`${API_BASE}/historico`)).json();
    renderHistorico(data.entries??[]);
  }catch{list.innerHTML='<p class="hist-empty" style="color:#991b1b">Não foi possível carregar o histórico.</p>';}
}

function safeId(n){return n.replace(/[^a-zA-Z0-9_-]/g,'_');}

function renderHistorico(entries){
  const list=$('hist-list');
  if(!entries.length){list.innerHTML='<p class="hist-empty">Ainda não há traduções guardadas.</p>';return;}
  list.innerHTML='';
  for(const e of entries){
    const date=new Date(e.createdAt).toLocaleString('pt-PT');
    const kb=(e.sizeBytes/1024).toFixed(1);
    const id=safeId(e.fileName);
    const item=document.createElement('div');
    item.className='hist-item';
    item.innerHTML=`<div><div>${e.fileName}</div><div class="hist-meta">${date} · ${kb} KB</div></div><div class="hist-item-actions"><button class="btn-view" data-filename="${e.fileName}" data-target="hist-detail-${id}">Ver</button><a class="btn-download" href="${API_BASE}/historico/${encodeURIComponent(e.fileName)}" download="${e.fileName}">Download json</a><button class="btn-delete" data-filename="${e.fileName}">Eliminar</button></div>`;
    list.appendChild(item);
    const detail=document.createElement('div');
    detail.className='hist-detail'; detail.id=`hist-detail-${id}`; detail.style.display='none';
    list.appendChild(detail);
  }
}

$('hist-list').addEventListener('click',async ev=>{
  const delBtn=ev.target.closest('.btn-delete');
  if(delBtn){
    if(!confirm('Tens a certeza que queres eliminar esta tradução?'))return;
    const fn=delBtn.dataset.filename;
    try{
      const res=await fetch(`${API_BASE}/historico/${encodeURIComponent(fn)}`,{method:'DELETE'});
      if(!res.ok)throw new Error((await res.json()).error??'Erro desconhecido');
      loadHistorico();
    }catch(err){alert(`Erro ao eliminar: ${err.message}`);}
    return;
  }
  const btn=ev.target.closest('.btn-view');
  if(!btn)return;
  const detail=$(btn.dataset.target);
  if(detail.style.display==='block'){detail.style.display='none';btn.textContent='Ver';return;}
  detail.style.display='block'; btn.textContent='Ocultar';
  if(detail.dataset.loaded)return;
  detail.innerHTML='<p class="hist-empty">A carregar…</p>';
  try{
    const res=await fetch(`${API_BASE}/historico/${encodeURIComponent(btn.dataset.filename)}/conteudo`);
    if(!res.ok)throw new Error();
    renderResults(await res.json(),detail);
    detail.dataset.loaded='1';
  }catch{detail.innerHTML='<p class="hist-empty" style="color:#991b1b">Não foi possível carregar esta tradução.</p>';}
});

$('btn-refresh-hist').addEventListener('click',loadHistorico);
loadHistorico();

$('btn-translate').addEventListener('click',async()=>{
  const html=quill.root.innerHTML.trim();
  const sourceLang=$('source-lang').value;
  const targetLangs=getSelectedLangs();
  if(!html||html==='<p><br></p>'){setStatus('Escreve algum texto antes de traduzir.','error');return;}
  if(!targetLangs.length){setStatus('Seleciona pelo menos um idioma de destino.','error');return;}
  const btn=$('btn-translate');
  btn.disabled=true; btn.textContent='A traduzir...';
  setStatus('A traduzir...','info');
  $('results-area').style.display='none';
  $('btn-publish').style.display='none';
  try{
    const res=await fetch(`${API_BASE}/translate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({htmlContent:html,sourceLanguage:sourceLang,targetLanguages:targetLangs})});
    const data=await res.json();
    if(!res.ok){setStatus(`Erro: ${data.error??'Erro desconhecido'}`,'error');return;}
    lastRecord=data.result;
    renderResults(data.result);
    setStatus(data.message,'ok');
    $('btn-publish').style.display='inline-block';
  }catch(err){setStatus(`Não foi possível ligar à API. Confirma que o servidor está a correr.\n${err.message}`,'error');}
  finally{btn.disabled=false;btn.textContent='Traduzir';}
});

$('btn-publish').addEventListener('click',async()=>{
  if(!lastRecord)return;
  const btn=$('btn-publish');
  btn.disabled=true; btn.textContent='A guardar...';
  setStatus('A guardar no histórico…','info');
  try{
    const res=await fetch(`${API_BASE}/publish`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({record:lastRecord})});
    const data=await res.json();
    if(!res.ok){setStatus(`Erro ao guardar: ${data.error??'Erro desconhecido'}`,'error');return;}
    setStatus(`${data.message} Ficheiro: ${data.fileName}`,'ok');
    btn.style.display='none';
    loadHistorico();
  }catch(err){setStatus(`Erro ao ligar ao endpoint /publish: ${err.message}`,'error');}
  finally{btn.disabled=false;btn.textContent='Guardar';}
});

function renderResults(record,targetContainer){
  const container=targetContainer??$('results-container');
  container.innerHTML='';
  container.appendChild(createResultBlock('Original - '+(LANG_NAMES[record.sourceLanguage]??record.sourceLanguage),record.originalText));
  for(const t of record.translations)
    container.appendChild(createResultBlock(LANG_NAMES[t.language]??t.language.toUpperCase(),t.translatedText));
  if(!targetContainer)$('results-area').style.display='block';
}

function createResultBlock(title,html){
  const b=document.createElement('div');
  b.className='result-block';
  b.innerHTML=`<div class="result-header">${title}</div><div class="result-content">${html}</div>`;
  return b;
}
</script>
</body>
</html>
